<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Capital Circle — Private Opportunity Marketplace</title>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050D1A"/>
      <stop offset="55%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#112344"/>
    </linearGradient>
    <radialGradient id="goldGlowTR" cx="100%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="navyGlowBL" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#4B6CA8" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#4B6CA8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#navyGlowBL)"/>
  <rect width="1200" height="630" fill="url(#goldGlowTR)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Logo (left side, vertically centered). Icon master scaled 2.6× and placed at translate(105, 185). -->
  <g transform="translate(105, 185)">
    <!-- Navy disc -->
    <circle cx="130" cy="130" r="130" fill="#0A1628"/>
    <!-- Outer hairline -->
    <circle cx="130" cy="130" r="129" fill="none" stroke="#D4AF37" stroke-width="1.4" opacity="0.65"/>
    <!-- Inner accent ring -->
    <circle cx="130" cy="130" r="119.6" fill="none" stroke="#D4AF37" stroke-width="1.3" opacity="0.32"/>
    <!-- Left C: center (91, 130), r=57.2, tips at (137.85, 97.19) and (137.85, 162.81) -->
    <path d="M 137.85 97.19 A 57.2 57.2 0 1 0 137.85 162.81"
          fill="none" stroke="#D4AF37" stroke-width="18.2" stroke-linecap="round"/>
    <!-- Right C: center (169, 130), r=57.2, tips at (122.15, 97.19) and (122.15, 162.81) -->
    <path d="M 122.15 97.19 A 57.2 57.2 0 1 1 122.15 162.81"
          fill="none" stroke="#D4AF37" stroke-width="18.2" stroke-linecap="round"/>
  </g>

  <!-- Text block on the right -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="475" y="232" font-size="22" font-weight="700" fill="#D4AF37" letter-spacing="6">PRIVATE OPPORTUNITY MARKETPLACE</text>
    <text x="475" y="332" font-size="86" font-weight="700" fill="#ffffff" letter-spacing="-2">Capital Circle</text>
    <line x1="475" y1="370" x2="575" y2="370" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>
    <text x="475" y="438" font-size="32" font-weight="400" fill="#ffffff" opacity="0.88">Where serious capital</text>
    <text x="475" y="484" font-size="32" font-weight="400" fill="#ffffff" opacity="0.88">meets real opportunity.</text>
  </g>

  <!-- Bottom strip stat row -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#ffffff" opacity="0.75">
    <text x="475" y="560" font-size="16" font-weight="600" letter-spacing="3">$2.4B+ DEAL FLOW</text>
    <text x="715" y="560" font-size="16" font-weight="600" letter-spacing="3">·</text>
    <text x="740" y="560" font-size="16" font-weight="600" letter-spacing="3">1,200+ MEMBERS</text>
    <text x="970" y="560" font-size="16" font-weight="600" letter-spacing="3">·</text>
    <text x="995" y="560" font-size="16" font-weight="600" letter-spacing="3">47 COUNTRIES</text>
  </g>
</svg>
